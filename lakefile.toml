name = "Norwich"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Norwich"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = false
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "Norwich"
# Build every module as its own root so CI compiles all files (e.g.
# `Solutions`, which can't be imported alongside `Talk` — they share
# declaration names like `E`).
globs = ["Norwich", "Norwich.+"]
